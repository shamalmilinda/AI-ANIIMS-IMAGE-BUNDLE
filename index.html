<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>AI ANIIMS</title>

<style>

/* =========================
RESET
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

html{
    font-size:16px;
    scroll-behavior:smooth;
}

body{
    min-height:100vh;
    width:100%;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    padding:20px;
    color:white;
    background:#050816;
    position:relative;
}

/* =========================
ANIMATED BACKGROUND
========================= */

body::before{
    content:"";
    position:absolute;
    width:55vw;
    height:55vw;
    max-width:650px;
    max-height:650px;
    min-width:250px;
    min-height:250px;
    background:
    radial-gradient(
        circle,
        rgba(0,255,255,0.22),
        transparent 70%
    );
    top:-15%;
    left:-10%;
    animation:moveGlow1 10s infinite alternate ease-in-out;
    z-index:0;
}

body::after{
    content:"";
    position:absolute;
    width:45vw;
    height:45vw;
    max-width:550px;
    max-height:550px;
    min-width:220px;
    min-height:220px;
    background:
    radial-gradient(
        circle,
        rgba(255,0,150,0.18),
        transparent 70%
    );
    bottom:-12%;
    right:-8%;
    animation:moveGlow2 12s infinite alternate ease-in-out;
    z-index:0;
}

/* =========================
PARTICLES
========================= */

.particles{
    position:absolute;
    inset:0;
    overflow:hidden;
    z-index:1;
}

.particles span{
    position:absolute;
    display:block;
    width:4px;
    height:4px;
    background:white;
    border-radius:50%;
    opacity:0.6;
    animation:float 15s linear infinite;
}

.particles span:nth-child(1){
    left:10%;
    animation-duration:12s;
    top:100%;
}

.particles span:nth-child(2){
    left:20%;
    animation-duration:18s;
    top:100%;
}

.particles span:nth-child(3){
    left:35%;
    animation-duration:10s;
    top:100%;
}

.particles span:nth-child(4){
    left:50%;
    animation-duration:20s;
    top:100%;
}

.particles span:nth-child(5){
    left:65%;
    animation-duration:14s;
    top:100%;
}

.particles span:nth-child(6){
    left:80%;
    animation-duration:16s;
    top:100%;
}

.particles span:nth-child(7){
    left:90%;
    animation-duration:11s;
    top:100%;
}

/* =========================
GLASS CONTAINER
========================= */

.container{
    position:relative;
    z-index:2;

    width:100%;
    max-width:480px;

    text-align:center;

    background:rgba(255,255,255,0.08);

    border:1px solid rgba(255,255,255,0.12);

    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);

    padding:clamp(28px, 5vw, 50px);

    border-radius:28px;

    box-shadow:
        0 0 20px rgba(0,255,255,0.15),
        0 0 40px rgba(255,0,150,0.15);

    animation:fadeIn 1s ease;
}

/* =========================
HEADING
========================= */

h1{
    font-size:clamp(2rem, 5vw, 3rem);

    margin-bottom:14px;

    font-weight:700;

    letter-spacing:1px;

    line-height:1.1;

    background:
    linear-gradient(
        90deg,
        #00ffff,
        #ff00aa
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* =========================
PARAGRAPH
========================= */

p{
    font-size:clamp(0.95rem, 2vw, 1.05rem);

    margin-bottom:28px;

    line-height:1.7;

    color:#e8e8e8;
}

/* =========================
BUTTON
========================= */

.btn{
    display:flex;
    justify-content:center;
    align-items:center;

    width:100%;

    min-height:54px;

    padding:15px 20px;

    border-radius:50px;

    text-decoration:none;

    color:white;

    font-size:clamp(0.95rem, 2vw, 1rem);

    font-weight:600;

    letter-spacing:0.5px;

    background:
    linear-gradient(
        135deg,
        #00c6ff,
        #ff0080
    );

    transition:0.35s ease;

    box-shadow:
        0 0 15px rgba(0,198,255,0.5),
        0 0 25px rgba(255,0,128,0.4);
}

.btn:hover{
    transform:translateY(-4px) scale(1.02);

    box-shadow:
        0 0 25px rgba(0,198,255,0.8),
        0 0 45px rgba(255,0,128,0.6);
}

.btn:active{
    transform:scale(0.98);
}

/* =========================
FOOTER
========================= */

footer{
    position:fixed;

    bottom:14px;
    left:0;

    width:100%;

    text-align:center;

    font-size:clamp(11px, 2vw, 13px);

    color:rgba(255,255,255,0.7);

    z-index:2;

    padding:0 10px;
}

/* =========================
ANIMATIONS
========================= */

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(-25px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes moveGlow1{

    from{
        transform:translate(0,0);
    }

    to{
        transform:translate(120px,80px);
    }
}

@keyframes moveGlow2{

    from{
        transform:translate(0,0);
    }

    to{
        transform:translate(-100px,-70px);
    }
}

@keyframes float{

    0%{
        transform:translateY(0) scale(0);
        opacity:0;
    }

    10%{
        opacity:1;
        transform:scale(1);
    }

    100%{
        transform:translateY(-110vh) scale(1.5);
        opacity:0;
    }
}

/* =========================
TABLET
========================= */

@media (max-width:768px){

    body{
        padding:18px;
    }

    .container{
        max-width:430px;
    }
}

/* =========================
MOBILE
========================= */

@media (max-width:480px){

    body{
        padding:15px;
    }

    .container{
        border-radius:24px;
    }

    .btn{
        min-height:50px;
    }

    body::before{
        width:80vw;
        height:80vw;
    }

    body::after{
        width:70vw;
        height:70vw;
    }
}

/* =========================
SMALL MOBILE
========================= */

@media (max-width:320px){

    .container{
        padding:24px 18px;
    }

    p{
        line-height:1.6;
    }
}

</style>
</head>

<body>

<!-- Floating Particles -->

<div class="particles">

    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>

</div>

<!-- Main Container -->

<div class="container">

    <h1>Welcome</h1>

    <p>
        Experience the next generation futuristic AI platform.
    </p>

    <a href="warning.html" class="btn">
        Go to Website
    </a>

</div>

<footer>
    © 2026 AI ANIIMS
</footer>

</body>
</html>
