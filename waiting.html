<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecting...</title>
<style>
* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Arial', sans-serif;
}

body {
    min-height:100vh;
    background: url('images/4.jpg') no-repeat center/cover;
    background-size: cover;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:white;
}

/* Glass Container */
.container {
    text-align:center;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
    padding:40px 30px;
    border-radius:20px;
    width:90%;
    max-width:400px;
    box-shadow:0 10px 40px rgba(0,0,0,0.7);
}

/* Heading */
h1 {
    font-size:28px;
    margin-bottom:20px;
    color:#ffffff;
    text-shadow:0 0 10px #000000;
}

/* Countdown Number */
#countdown {
    font-size:48px;
    font-weight:700;
    margin-bottom:20px;
    color:#fff;
    text-shadow: 0 0 15px #ff4b2b;
}

/* Redirect Text */
p {
    font-size:16px;
    color:#f0f0f0;
    text-shadow: 0 0 5px rgba(0,0,0,0.5);
}
</style>
</head>

<body>
<div class="container">
    <h1>Redirecting...</h1>
    <div id="countdown">6</div>
    <p>You will be redirected in <span id="seconds">10</span> seconds</p>
</div>

<script>
// Countdown and Redirect
let countdown = 6; // seconds
const countdownEl = document.getElementById('countdown');
const secondsEl = document.getElementById('seconds');

const timer = setInterval(() => {
    countdown--;
    countdownEl.textContent = countdown;
    secondsEl.textContent = countdown;

    if(countdown <= 0){
        clearInterval(timer);
        window.location.href = "Standard Gallery (Free view).html"; // Redirect URL
    }
}, 1000);
</script>
</body>
</html>
