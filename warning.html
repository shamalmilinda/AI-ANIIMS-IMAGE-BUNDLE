<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Warning Page</title>

<style>

/* =========================
RESET
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

html{
    font-size:16px;
    scroll-behavior:smooth;
}

body{
    min-height:100vh;
    width:100%;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    padding:20px;

    background:#050816;
    color:white;

    position:relative;
}

/* =========================
ANIMATED BACKGROUND
========================= */

body::before{
    content:"";
    position:absolute;

    width:60vw;
    height:60vw;

    max-width:700px;
    max-height:700px;

    min-width:260px;
    min-height:260px;

    background:
    radial-gradient(
        circle,
        rgba(255,0,120,0.20),
        transparent 70%
    );

    top:-18%;
    left:-12%;

    animation:glowMove1 10s infinite alternate ease-in-out;

    z-index:0;
}

body::after{
    content:"";
    position:absolute;

    width:50vw;
    height:50vw;

    max-width:580px;
    max-height:580px;

    min-width:220px;
    min-height:220px;

    background:
    radial-gradient(
        circle,
        rgba(0,255,255,0.18),
        transparent 70%
    );

    bottom:-15%;
    right:-10%;

    animation:glowMove2 12s infinite alternate ease-in-out;

    z-index:0;
}

/* =========================
PARTICLES
========================= */

.particles{
    position:absolute;
    inset:0;
    overflow:hidden;
    z-index:1;
}

.particles span{
    position:absolute;
    width:4px;
    height:4px;
    background:white;
    border-radius:50%;
    opacity:0.5;
    animation:float 14s linear infinite;
}

.particles span:nth-child(1){
    left:10%;
    top:100%;
    animation-duration:10s;
}

.particles span:nth-child(2){
    left:22%;
    top:100%;
    animation-duration:16s;
}

.particles span:nth-child(3){
    left:38%;
    top:100%;
    animation-duration:12s;
}

.particles span:nth-child(4){
    left:50%;
    top:100%;
    animation-duration:18s;
}

.particles span:nth-child(5){
    left:66%;
    top:100%;
    animation-duration:14s;
}

.particles span:nth-child(6){
    left:82%;
    top:100%;
    animation-duration:11s;
}

.particles span:nth-child(7){
    left:92%;
    top:100%;
    animation-duration:15s;
}

/* =========================
GLASS CONTAINER
========================= */

.container{
    position:relative;
    z-index:2;

    width:100%;
    max-width:500px;

    padding:
    clamp(28px, 5vw, 50px);

    text-align:center;

    border-radius:30px;

    background:rgba(255,255,255,0.08);

    border:1px solid rgba(255,255,255,0.10);

    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);

    box-shadow:
        0 0 20px rgba(255,0,120,0.15),
        0 0 45px rgba(0,255,255,0.10);

    animation:fadeIn 1s ease;
}

/* =========================
ICON
========================= */

.warning-icon{
    font-size:clamp(48px, 8vw, 64px);

    margin-bottom:16px;

    animation:pulse 2s infinite;
}

/* =========================
HEADINGS
========================= */

h1{
    font-size:clamp(2rem, 5vw, 3rem);

    margin-bottom:10px;

    font-weight:700;

    line-height:1.1;

    background:
    linear-gradient(
        90deg,
        #ff3c7d,
        #00ffff
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

h2{
    font-size:clamp(1.2rem, 3vw, 1.5rem);

    margin-bottom:16px;

    color:#ffffff;

    line-height:1.3;
}

/* =========================
TEXT
========================= */

p{
    font-size:clamp(0.95rem, 2vw, 1.05rem);

    line-height:1.8;

    color:#e6e6e6;

    margin-bottom:28px;
}

/* =========================
BUTTONS
========================= */

.btn{
    display:flex;
    justify-content:center;
    align-items:center;

    width:100%;

    min-height:54px;

    padding:15px 20px;

    border-radius:50px;

    text-decoration:none;

    font-size:clamp(0.95rem, 2vw, 1rem);

    font-weight:600;

    color:white;

    margin-top:14px;

    transition:0.35s ease;
}

/* Continue Button */

.btn-primary{
    background:
    linear-gradient(
        135deg,
        #ff0055,
        #ff7b00
    );

    box-shadow:
        0 0 15px rgba(255,0,85,0.5),
        0 0 30px rgba(255,123,0,0.4);
}

.btn-primary:hover{
    transform:translateY(-4px);

    box-shadow:
        0 0 25px rgba(255,0,85,0.8),
        0 0 45px rgba(255,123,0,0.6);
}

/* Back Button */

.btn-back{
    background:rgba(255,255,255,0.08);

    border:1px solid rgba(255,255,255,0.1);

    box-shadow:0 0 15px rgba(255,255,255,0.08);
}

.btn-back:hover{
    transform:translateY(-4px);

    background:rgba(0,255,255,0.12);

    box-shadow:0 0 25px rgba(0,255,255,0.2);
}

/* =========================
FOOTER
========================= */

footer{
    position:fixed;

    bottom:14px;
    left:0;

    width:100%;

    text-align:center;

    font-size:clamp(11px, 2vw, 13px);

    color:rgba(255,255,255,0.65);

    z-index:2;

    padding:0 10px;
}

/* =========================
ANIMATIONS
========================= */

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(-25px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes pulse{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.08);
    }

    100%{
        transform:scale(1);
    }
}

@keyframes glowMove1{

    from{
        transform:translate(0,0);
    }

    to{
        transform:translate(120px,90px);
    }
}

@keyframes glowMove2{

    from{
        transform:translate(0,0);
    }

    to{
        transform:translate(-100px,-70px);
    }
}

@keyframes float{

    0%{
        transform:translateY(0) scale(0);
        opacity:0;
    }

    10%{
        opacity:1;
        transform:scale(1);
    }

    100%{
        transform:translateY(-110vh) scale(1.4);
        opacity:0;
    }
}

/* =========================
TABLET
========================= */

@media (max-width:768px){

    body{
        padding:18px;
    }

    .container{
        max-width:450px;
    }
}

/* =========================
MOBILE
========================= */

@media (max-width:480px){

    body{
        padding:15px;
    }

    .container{
        border-radius:24px;
    }

    .btn{
        min-height:50px;
    }

    body::before{
        width:85vw;
        height:85vw;
    }

    body::after{
        width:75vw;
        height:75vw;
    }
}

/* =========================
SMALL MOBILE
========================= */

@media (max-width:320px){

    .container{
        padding:24px 18px;
    }

    p{
        line-height:1.6;
    }
}

</style>
</head>

<body>

<!-- Particles -->

<div class="particles">

    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>

</div>

<!-- Main Container -->

<div class="container">

    <div class="warning-icon">⚠️</div>

    <h1>Warning</h1>

    <h2>Restricted Section</h2>

    <p>
        This page contains restricted content.
        Please continue only if you are allowed to access this section.
    </p>

    <!-- Continue Button -->

    <a href="waiting.html" class="btn btn-primary">
        Continue
    </a>

    <!-- Back Button -->

    <a href="index.html" class="btn btn-back">
        Go Back
    </a>

</div>

<footer>
    © 2026 AI ANIIMS
</footer>

</body>
</html>
