<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warning Page</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:#050816;
    color:white;
    position:relative;
}

/* Animated Background */

body::before{
    content:"";
    position:absolute;
    width:650px;
    height:650px;
    background:radial-gradient(circle, rgba(255,0,120,0.20), transparent 70%);
    top:-250px;
    left:-180px;
    animation:glowMove1 10s infinite alternate ease-in-out;
}

body::after{
    content:"";
    position:absolute;
    width:550px;
    height:550px;
    background:radial-gradient(circle, rgba(0,255,255,0.18), transparent 70%);
    bottom:-200px;
    right:-140px;
    animation:glowMove2 12s infinite alternate ease-in-out;
}

/* Floating Particles */

.particles span{
    position:absolute;
    width:4px;
    height:4px;
    background:white;
    border-radius:50%;
    opacity:0.5;
    animation:float 14s linear infinite;
}

.particles span:nth-child(1){left:10%; top:100%; animation-duration:10s;}
.particles span:nth-child(2){left:22%; top:100%; animation-duration:16s;}
.particles span:nth-child(3){left:38%; top:100%; animation-duration:12s;}
.particles span:nth-child(4){left:50%; top:100%; animation-duration:18s;}
.particles span:nth-child(5){left:66%; top:100%; animation-duration:14s;}
.particles span:nth-child(6){left:82%; top:100%; animation-duration:11s;}
.particles span:nth-child(7){left:92%; top:100%; animation-duration:15s;}

/* Glass Container */

.container{
    position:relative;
    z-index:2;
    width:90%;
    max-width:470px;
    padding:45px 35px;
    text-align:center;
    border-radius:28px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.08);
    backdrop-filter:blur(18px);
    box-shadow:
        0 0 20px rgba(255,0,120,0.15),
        0 0 45px rgba(0,255,255,0.10);
    animation:fadeIn 1s ease;
}

/* Icon */

.warning-icon{
    font-size:55px;
    margin-bottom:15px;
    animation:pulse 2s infinite;
}

/* Headings */

h1{
    font-size:34px;
    margin-bottom:10px;
    font-weight:700;
    background:linear-gradient(90deg,#ff3c7d,#00ffff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

h2{
    font-size:22px;
    margin-bottom:15px;
    color:#ffffff;
}

/* Text */

p{
    font-size:16px;
    line-height:1.7;
    color:#e6e6e6;
    margin-bottom:25px;
}

/* Buttons */

.btn{
    display:block;
    width:100%;
    padding:15px 0;
    border-radius:50px;
    text-decoration:none;
    font-size:16px;
    font-weight:600;
    color:white;
    margin-top:14px;
    transition:0.35s ease;
}

/* Continue Button */

.btn-primary{
    background:linear-gradient(135deg,#ff0055,#ff7b00);
    box-shadow:
        0 0 15px rgba(255,0,85,0.5),
        0 0 30px rgba(255,123,0,0.4);
}

.btn-primary:hover{
    transform:translateY(-4px);
    box-shadow:
        0 0 25px rgba(255,0,85,0.8),
        0 0 45px rgba(255,123,0,0.6);
}

/* Back Button */

.btn-back{
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.1);
    box-shadow:0 0 15px rgba(255,255,255,0.08);
}

.btn-back:hover{
    transform:translateY(-4px);
    background:rgba(0,255,255,0.12);
    box-shadow:0 0 25px rgba(0,255,255,0.2);
}

/* Footer */

footer{
    position:fixed;
    bottom:15px;
    width:100%;
    text-align:center;
    font-size:13px;
    color:rgba(255,255,255,0.65);
    z-index:2;
}

/* Animations */

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(-25px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes pulse{
    0%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.08);
    }
    100%{
        transform:scale(1);
    }
}

@keyframes glowMove1{
    from{
        transform:translate(0,0);
    }
    to{
        transform:translate(120px,90px);
    }
}

@keyframes glowMove2{
    from{
        transform:translate(0,0);
    }
    to{
        transform:translate(-100px,-70px);
    }
}

@keyframes float{
    0%{
        transform:translateY(0) scale(0);
        opacity:0;
    }

    10%{
        opacity:1;
        transform:scale(1);
    }

    100%{
        transform:translateY(-110vh) scale(1.4);
        opacity:0;
    }
}

/* Responsive */

@media(max-width:480px){

    .container{
        padding:35px 22px;
    }

    h1{
        font-size:28px;
    }

    h2{
        font-size:19px;
    }

    p{
        font-size:14px;
    }

    .btn{
        font-size:14px;
        padding:13px 0;
    }

    .warning-icon{
        font-size:48px;
    }
}

</style>
</head>

<body>

<!-- Particles -->

<div class="particles">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
</div>

<!-- Main Container -->

<div class="container">

    <div class="warning-icon">⚠️</div>

    <h1>Warning</h1>

    <h2>Restricted Section</h2>

    <p>
        This page contains restricted content.
        Please continue only if you are allowed to access this section.
    </p>

    <!-- Continue Button -->

    <a href="waiting.html" class="btn btn-primary">
        Continue
    </a>

    <!-- Back Button -->

    <a href="index.html" class="btn btn-back">
        Go Back
    </a>

</div>

<footer>
    © 2026 AI ANIIMS
</footer>

</body>
</html>
